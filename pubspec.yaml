name: mobile_app
description: "RMZ for Recruitment"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & DI
  flutter_riverpod: ^2.5.1
  
  # Routing
  go_router: ^14.0.0
  
  # Networking
  dio: ^5.4.3+1
  
  # Local Storage & Security
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.1
  
  # Localization & Fonts
  easy_localization: ^3.0.5
  google_fonts: ^6.2.1
  
  # Responsive UI
  flutter_screenutil: ^5.9.0
  
  # Image Caching & Assets
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  
  # Data Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets Configuration
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
